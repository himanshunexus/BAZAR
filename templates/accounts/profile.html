{% extends 'base.html' %}

{% block title %}My Profile{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-10">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <h1 class="text-2xl font-bold mb-6">My Profile</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<p class="text-xs text-red-500 mt-1">{{ error }}</p>{% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}
