<a href="{{ product.get_absolute_url }}" class="bg-white rounded-lg shadow-sm hover:shadow-md transition border border-gray-100 overflow-hidden block">
    {% if product.images.first %}
    <img src="{{ product.images.first.image.url }}" alt="{{ product.images.first.alt_text|default:product.name }}" class="w-full h-40 object-cover" loading="lazy">
    {% else %}
    <div class="w-full h-40 bg-gray-100 flex items-center justify-center text-gray-300">
        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
    </div>
    {% endif %}
    <div class="p-3">
        <h3 class="text-sm font-medium text-gray-800 truncate">{{ product.name }}</h3>
        <div class="mt-1 flex items-center gap-2">
            <span class="text-sm font-bold text-indigo-600">₹{{ product.display_price }}</span>
            {% if product.discount_percent > 0 %}
            <span class="text-xs text-gray-400 line-through">₹{{ product.price }}</span>
            <span class="text-xs text-green-600 font-medium">{{ product.discount_percent }}% off</span>
            {% endif %}
        </div>
        {% if not product.in_stock %}
        <span class="text-xs text-red-500 mt-1 inline-block">Out of stock</span>
        {% endif %}
    </div>
</a>
