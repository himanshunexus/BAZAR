{% extends 'base.html' %}

{% block title %}Checkout{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">Checkout</h1>

    <!-- Order Summary -->
    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
        <h2 class="font-semibold mb-4">Order Summary</h2>
        <div class="divide-y">
            {% for item in cart %}
            <div class="py-3 flex justify-between text-sm">
                <span>{{ item.product.name }} x {{ item.quantity }}</span>
                <span class="font-medium">₹{{ item.total_price }}</span>
            </div>
            {% endfor %}
        </div>
        <div class="pt-4 mt-4 border-t flex justify-between font-bold text-lg">
            <span>Total</span>
            <span class="text-indigo-600">₹{{ cart.total_price }}</span>
        </div>
    </div>

    <!-- Contact details -->
    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
        <h2 class="font-semibold mb-4">Contact Details</h2>
        <form method="post" action="{% url 'cart:checkout' %}" class="space-y-4">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Full Name" required
                   value="{% if user.is_authenticated %}{{ user.full_name }}{% endif %}"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500">
            <input type="tel" name="phone" placeholder="Phone Number" required
                   value="{% if user.is_authenticated %}{{ user.phone }}{% endif %}"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500">
            <textarea name="address" placeholder="Delivery Address" rows="3" required
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500"></textarea>

            <div class="pt-4">
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition">
                    Place Order (Cash on Delivery)
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
