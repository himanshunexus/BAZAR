services:
  - type: web
    name: localbazaarhub
    runtime: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "chmod +x start.sh && ./start.sh"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: localbazaarhub.settings.production
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://localbazaarhub.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: localbazaarhub-db
          property: connectionString

databases:
  - name: localbazaarhub-db
    plan: free
